name: Deploy site to GitHub Pages

# Rebuilds + deploys the static site whenever the code or the deals data changes.
# The autonomous ingest workflow (Phase B) commits data/deals.json, which triggers this.
on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "data/deals.json"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22 # Astro 6 requires Node >=22.12 (see web/package.json engines)
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run build # prebuild copies repo-root data/deals.json into the site
        env:
          # Auto-derive the Pages URL — no manual config needed for a normal repo.
          BASE_PATH: /${{ github.event.repository.name }}/
          SITE_URL: https://${{ github.repository_owner }}.github.io
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
